<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4-Принт | CMYK Professional</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CMYK Color Palette */
        :root {
            --c-cyan: #00A3E0;
            --c-magenta: #E2007A;
            --c-yellow: #FFD100;
            --c-black: #231F20;
            --c-cyan-light: #E6F4FA;
            --c-magenta-light: #FCE6F2;
            --c-yellow-light: #FFF8E0;
            --c-gray-light: #F5F5F5;
            --c-gray: #8C8C8C;
            --c-white: #FFFFFF;
        }

        body {
            background: var(--c-gray-light);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 28px;
            color: var(--c-black);
            transition: background 0.2s;
        }

        /* Тёмная версия CMYK (чёрная) */
        body.dark {
            background: var(--c-black);
            color: var(--c-gray-light);
        }

        body.dark .card,
        body.dark .cart-panel,
        body.dark .history-section,
        body.dark .shift-bar {
            background: #2D2A2C;
            border-color: #3D3A3C;
        }

        body.dark .service-card,
        body.dark .cart-item,
        body.dark .history-item,
        body.dark .stat-card {
            background: #1A1A1C;
            border-color: #3D3A3C;
        }

        body.dark input, body.dark select, body.dark textarea {
            background: #2D2A2C;
            border-color: #4D4A4C;
            color: var(--c-gray-light);
        }

        body.dark .user-bar {
            background: #2D2A2C;
        }

        body.dark .btn-outline {
            border-color: #5D5A5C;
            color: var(--c-gray-light);
        }

        .app {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Шапка с CMYK лентой */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            padding: 16px 24px;
            background: var(--c-white);
            border-radius: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-left: 8px solid var(--c-cyan);
            border-bottom: 3px solid var(--c-magenta);
        }

        body.dark .header {
            background: #2D2A2C;
        }

        .cmyk-strip {
            display: flex;
            gap: 2px;
            margin-top: 8px;
        }
        .cmyk-strip span {
            width: 50px;
            height: 4px;
            border-radius: 2px;
        }
        .cyan-bg { background: var(--c-cyan); }
        .magenta-bg { background: var(--c-magenta); }
        .yellow-bg { background: var(--c-yellow); }
        .black-bg { background: var(--c-black); }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            height: 48px;
            width: auto;
            border-radius: 12px;
            background: white;
            padding: 4px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--c-black);
        }
        body.dark h1 { color: var(--c-gray-light); }

        .sub {
            font-size: 12px;
            color: var(--c-gray);
        }

        .user-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--c-gray-light);
            padding: 6px 20px;
            border-radius: 60px;
        }

        button {
            background: var(--c-black);
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.15s ease;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(0.9);
        }

        .btn-cyan { background: var(--c-cyan); color: var(--c-black); }
        .btn-magenta { background: var(--c-magenta); }
        .btn-yellow { background: var(--c-yellow); color: var(--c-black); }
        .btn-outline { background: transparent; border: 2px solid var(--c-black); color: var(--c-black); }
        body.dark .btn-outline { border-color: var(--c-gray-light); color: var(--c-gray-light); }
        .btn-success { background: #1f8a5c; }
        .btn-danger { background: #c2412c; }

        .shift-bar {
            background: var(--c-white);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 13px;
            font-weight: 500;
            border-left: 4px solid var(--c-cyan);
        }

        .dashboard {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .card {
            flex: 2;
            min-width: 380px;
            background: var(--c-white);
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            border-top: 3px solid var(--c-cyan);
        }

        .cart-panel {
            flex: 1.2;
            min-width: 360px;
            background: var(--c-white);
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            border-top: 3px solid var(--c-magenta);
        }

        .history-section {
            background: var(--c-white);
            border-radius: 32px;
            padding: 28px;
            border-top: 3px solid var(--c-yellow);
        }

        .panel-title {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--c-gray);
            margin-bottom: 22px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
            max-height: 560px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .service-card {
            background: var(--c-gray-light);
            border-radius: 28px;
            padding: 16px 12px;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid #E0E0E0;
            cursor: pointer;
        }

        body.dark .service-card {
            background: #2D2A2C;
            border-color: #4D4A4C;
        }

        .service-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: var(--c-cyan);
        }

        .service-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .service-price {
            font-size: 18px;
            font-weight: 800;
            color: var(--c-magenta);
            margin-bottom: 12px;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 8px;
        }

        .qty-btn {
            background: #E0E0E0;
            width: 36px;
            height: 36px;
            border-radius: 60px;
            padding: 0;
            font-size: 18px;
            font-weight: bold;
        }
        body.dark .qty-btn { background: #4D4A4C; color: white; }

        .qty-value {
            font-weight: 700;
            font-size: 18px;
            min-width: 32px;
        }

        .add-btn {
            background: var(--c-cyan);
            color: var(--c-black);
            margin-top: 14px;
            width: 100%;
            padding: 10px;
            font-size: 13px;
            font-weight: 700;
        }

        .cart-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 6px;
        }

        .cart-item {
            background: var(--c-gray-light);
            border-radius: 24px;
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-left: 4px solid var(--c-magenta);
        }

        body.dark .cart-item {
            background: #2D2A2C;
        }

        .cart-item-info { flex: 2; }
        .cart-item-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
        .cart-item-detail { font-size: 12px; color: var(--c-gray); }
        .cart-item-price { font-weight: 800; font-size: 16px; color: var(--c-magenta); }

        .remove-btn {
            background: #FCE6F2;
            color: var(--c-magenta);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        body.dark .remove-btn { background: #4D2A3C; }

        input, select, textarea {
            width: 100%;
            padding: 14px 18px;
            background: var(--c-gray-light);
            border: 1px solid #D0D0D0;
            border-radius: 24px;
            font-size: 14px;
            transition: 0.15s;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--c-cyan);
            box-shadow: 0 0 0 3px rgba(0,163,224,0.1);
        }

        .total-line {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-top: 1px solid #E0E0E0;
            font-weight: 600;
            font-size: 15px;
        }
        body.dark .total-line { border-top-color: #4D4A4C; }

        .grand-total {
            font-size: 24px;
            font-weight: 800;
            color: var(--c-cyan);
        }

        .row-2 {
            display: flex;
            gap: 14px;
            margin: 18px 0;
            flex-wrap: wrap;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 320px;
            overflow-y: auto;
        }

        .history-item {
            background: var(--c-gray-light);
            border-radius: 28px;
            padding: 18px;
            border-left: 4px solid var(--c-yellow);
        }
        body.dark .history-item { background: #2D2A2C; }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: var(--c-white);
            border-radius: 48px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
            border-top: 5px solid var(--c-cyan);
        }
        body.dark .modal-card { background: #2D2A2C; }

        .stat-card {
            background: var(--c-gray-light);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 14px;
            border-left: 4px solid var(--c-cyan);
        }
        body.dark .stat-card { background: #1A1A1C; }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .stat-value {
            font-weight: 800;
            font-size: 18px;
            color: var(--c-magenta);
        }

        .pdf-report {
            padding: 24px;
            font-family: monospace;
            color: #000 !important;
            background: white !important;
        }
        .pdf-report * { color: #000 !important; }

        @media (max-width: 900px) {
            body { padding: 16px; }
            .dashboard { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="loginOverlay" class="modal" style="display: flex;">
    <div class="modal-card" style="max-width: 380px;">
        <div class="cmyk-strip" style="justify-content: center; margin-bottom: 16px;">
            <span class="cyan-bg"></span><span class="magenta-bg"></span><span class="yellow-bg"></span><span class="black-bg"></span>
        </div>
        <h2 style="text-align:center; margin-bottom: 20px;">A4-Принт</h2>
        <input type="text" id="loginUsername" placeholder="Логин" style="margin-bottom: 14px;">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="loginBtn" style="width:100%; margin-top: 24px; background: var(--c-black);">Войти</button>
        <div id="loginError" style="color:#c2412c; margin-top: 16px; text-align:center;"></div>
    </div>
</div>

<div id="mainContent" style="display: none;">
<div class="app">
    <div class="header">
        <div class="logo-area">
            <img src="https://github.com/a4print2026-jpg/baza/blob/dbcda72ab60f0a9f8d8984e17375f6649cf677f0/images/logo_soc2.png?raw=true" class="logo" onerror="this.style.display='none'">
            <div>
                <h1>A4‑ПРИНТ</h1>
                <div class="cmyk-strip"><span class="cyan-bg"></span><span class="magenta-bg"></span><span class="yellow-bg"></span><span class="black-bg"></span></div>
                <div class="sub">CMYK Professional</div>
            </div>
        </div>
        <div class="user-bar">
            <span id="currentOperatorName" style="font-weight: 500;"></span>
            <button id="themeToggleBtn" class="btn-outline">🌙 Тёмная</button>
            <button id="adminPanelBtn" style="background: var(--c-cyan); color: var(--c-black);">Админ</button>
            <button id="shiftToggleBtn" style="background: var(--c-yellow); color: var(--c-black);">🚀 Открыть смену</button>
            <button id="pdfReportBtn" style="background: var(--c-magenta);">📄 Отчёт</button>
            <button id="logoutBtn" class="btn-outline">Выйти</button>
        </div>
    </div>

    <div class="shift-bar">
        <span>🕒 Смена: <strong id="shiftStatus">Закрыта</strong></span>
        <span>🟢 Открыта: <span id="shiftOpenTime">—</span></span>
        <span>🔴 Закрыта: <span id="shiftCloseTime">—</span></span>
    </div>

    <div class="dashboard">
        <div class="card">
            <div class="panel-title">📋 УСЛУГИ (CMYK)</div>
            <div id="servicesGrid" class="services-grid"></div>
        </div>

        <div class="cart-panel">
            <div class="panel-title">🧾 ОФОРМЛЕНИЕ</div>
            <input type="text" id="clientName" placeholder="Клиент (необязательно)" style="margin-bottom: 20px;">
            
            <div class="cart-list" id="cartList"></div>

            <div class="row-2">
                <input type="number" id="discountPercent" placeholder="Скидка %" value="0" step="1">
                <input type="number" id="discountAmount" placeholder="Скидка ₽" value="0" step="10">
                <button id="applyDiscountBtn" class="btn-outline" style="padding: 8px 16px;">Применить</button>
            </div>

            <div class="row-2">
                <label style="display:flex; gap:8px; align-items:center;"><input type="radio" name="payment" value="cash" checked> 💵 Наличные</label>
                <label style="display:flex; gap:8px; align-items:center;"><input type="radio" name="payment" value="card"> 💳 Карта</label>
            </div>

            <textarea id="orderComment" rows="2" placeholder="Комментарий к заказу..."></textarea>

            <div class="total-line"><span>Подытог</span><span id="cartSubtotal">0 ₽</span></div>
            <div class="total-line" id="discountLine" style="display:none;"><span>Скидка</span><span id="cartDiscount">0 ₽</span></div>
            <div class="total-line grand-total"><span>ИТОГО</span><span id="cartTotal">0 ₽</span></div>

            <div class="row-2">
                <button id="completeOrderBtn" style="background: var(--c-cyan); color: var(--c-black); flex:2;">✅ Оформить</button>
                <button id="clearCartBtn" class="btn-outline" style="flex:1;">Очистить</button>
            </div>
        </div>
    </div>

    <div class="history-section">
        <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px;">
            <div class="panel-title" style="margin-bottom:0;">📜 ИСТОРИЯ ЗАКАЗОВ</div>
            <div style="display: flex; gap: 12px;">
                <button id="exportExcelBtn" style="background: var(--c-yellow); color: var(--c-black);">📎 Excel</button>
                <button id="clearHistoryBtn" class="btn-danger">🗑 Очистить мои</button>
            </div>
        </div>
        <div id="historyList" class="history-list"></div>
    </div>
</div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>⚙️ Администрирование</h2>
            <button id="closeAdminModal" style="background:none; font-size: 28px;">✕</button>
        </div>
        
        <button id="viewOperatorsStatsBtn" style="background: var(--c-cyan); color: var(--c-black); width:100%; margin: 10px 0 20px;">📊 Полная статистика операторов</button>
        
        <h3>📋 Управление услугами</h3>
        <div id="adminServicesList"></div>
        <div style="display: flex; gap: 12px; margin-top: 16px;">
            <input type="text" id="newServiceName" placeholder="Название услуги">
            <input type="number" id="newServicePrice" placeholder="Цена">
            <button id="addServiceBtn" style="background: var(--c-cyan); color: var(--c-black);">Добавить</button>
        </div>
        <hr style="margin: 20px 0;">
        <h3>👥 Управление операторами</h3>
        <div id="operatorsList"></div>
        <div style="display: flex; gap: 12px; margin-top: 16px;">
            <input type="text" id="newOpLogin" placeholder="Логин">
            <input type="text" id="newOpName" placeholder="Имя">
            <input type="text" id="newOpPass" placeholder="Пароль">
            <button id="addOperatorBtn" style="background: var(--c-magenta);">Добавить</button>
        </div>
    </div>
</div>

<div id="operatorsStatsModal" class="modal">
    <div class="modal-card" style="max-width: 700px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2>📊 Статистика операторов</h2>
            <button id="closeStatsModal" style="background:none; font-size: 28px;">✕</button>
        </div>
        <div id="operatorsStatsContent"></div>
        <button id="exportStatsExcelBtn" style="background: var(--c-yellow); color: var(--c-black); margin-top: 24px; width:100%;">📎 Экспорт статистики в Excel</button>
    </div>
</div>

<script>
    // ========== УСЛУГИ (полный прайс) ==========
    let services = [
        { id: 1, name: "Копирование ч/б A4 (1-20)", price: 25 }, { id: 2, name: "Копирование цветное A4 (1-20)", price: 35 },
        { id: 3, name: "Сканирование A4", price: 25 }, { id: 4, name: "Ламинирование A6", price: 50 },
        { id: 5, name: "Ламинирование A5", price: 100 }, { id: 6, name: "Ламинирование A4", price: 150 },
        { id: 7, name: "Ламинирование A3", price: 200 }, { id: 8, name: "Брошюровка (до 50 стр)", price: 350 },
        { id: 9, name: "Набор текста (1 стр)", price: 150 }, { id: 10, name: "Печать фото 10x15", price: 55 },
        { id: 11, name: "Печать фото 13x18", price: 50 }, { id: 12, name: "Печать фото 15x21", price: 75 },
        { id: 13, name: "Печать фото 21x30", price: 200 }, { id: 14, name: "Печать фото 30x40", price: 450 },
        { id: 15, name: "ФНД", price: 350 }, { id: 16, name: "Печать на кружке", price: 1000 },
        { id: 17, name: "Печать на футболке", price: 1500 }, { id: 18, name: "Ретушь фото", price: 200 },
        { id: 19, name: "Кадрирование", price: 30 }, { id: 20, name: "Печать на самоклейке ЦВ", price: 75 },
        { id: 21, name: "Печать на самоклейке ЧБ", price: 50 }, { id: 22, name: "ФНД Виза", price: 400 },
        { id: 23, name: "Копирование ч/б A4 (20-50)", price: 20 }, { id: 24, name: "Фото в рамке А4", price: 400 },
        { id: 25, name: "Фото в рамке 10х15", price: 200 }
    ];

    let operators = {
        "admin": { password: "admin123", name: "Администратор", role: "admin" },
        "anna": { password: "anna321", name: "Анна", role: "operator" },
        "sergey": { password: "sergey321", name: "Сергей", role: "operator" }
    };

    let allOrders = [], currentUser = null, cart = [], discountPct = 0, discountAmt = 0;
    let shiftOpen = null, shiftClose = null;

    const SERVICES_KEY = "a4print_services_cmyk", OPERATORS_KEY = "a4print_operators", ORDERS_KEY = "a4print_orders", SHIFT_KEY = "a4print_shift";

    function saveServices() { localStorage.setItem(SERVICES_KEY, JSON.stringify(services)); }
    function saveOperators() { localStorage.setItem(OPERATORS_KEY, JSON.stringify(operators)); }
    function saveOrders() { localStorage.setItem(ORDERS_KEY, JSON.stringify(allOrders)); }
    function saveShift() { localStorage.setItem(SHIFT_KEY, JSON.stringify({ open: shiftOpen, close: shiftClose, operator: currentUser?.name })); }

    function loadShift() {
        let saved = localStorage.getItem(SHIFT_KEY);
        if (saved) { let s = JSON.parse(saved); if (s.operator === currentUser?.name) { shiftOpen = s.open; shiftClose = s.close; } }
        updateShiftUI();
    }
    function updateShiftUI() {
        document.getElementById("shiftStatus").innerText = (shiftOpen && !shiftClose) ? "🟢 Открыта" : (shiftOpen && shiftClose ? "🔴 Закрыта" : "⚫ Не открыта");
        document.getElementById("shiftOpenTime").innerText = shiftOpen || "—";
        document.getElementById("shiftCloseTime").innerText = shiftClose || "—";
        let btn = document.getElementById("shiftToggleBtn");
        if (shiftOpen && !shiftClose) { btn.innerText = "🔒 Закрыть смену"; btn.style.background = "#c2412c"; btn.style.color = "white"; }
        else { btn.innerText = "🚀 Открыть смену"; btn.style.background = "#FFD100"; btn.style.color = "#231F20"; }
    }
    function toggleShift() {
        if (!shiftOpen || shiftClose) { shiftOpen = new Date().toLocaleString(); shiftClose = null; saveShift(); updateShiftUI(); alert("Смена открыта: " + shiftOpen); }
        else if (confirm("Закрыть смену?")) { shiftClose = new Date().toLocaleString(); saveShift(); updateShiftUI(); alert("Смена закрыта: " + shiftClose); }
    }

    function loadData() {
        let s = localStorage.getItem(SERVICES_KEY); if (s) services = JSON.parse(s);
        let o = localStorage.getItem(OPERATORS_KEY); if (o) operators = JSON.parse(o);
        let ord = localStorage.getItem(ORDERS_KEY); if (ord) allOrders = JSON.parse(ord);
        renderServices(); renderCart(); renderHistory(); loadShift();
    }

    let tempQtys = {};
    function renderServices() {
        const grid = document.getElementById("servicesGrid");
        grid.innerHTML = "";
        services.forEach(s => {
            let card = document.createElement("div");
            card.className = "service-card";
            card.innerHTML = `
                <div class="service-name">${escapeHtml(s.name)}</div>
                <div class="service-price">${s.price} ₽</div>
                <div class="qty-controls">
                    <button class="qty-btn minus" data-id="${s.id}">−</button>
                    <span class="qty-value" id="qty_${s.id}">0</span>
                    <button class="qty-btn plus" data-id="${s.id}">+</button>
                </div>
                <button class="add-btn" data-id="${s.id}">➕ Добавить</button>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll(".plus").forEach(btn => btn.onclick = (e) => { e.stopPropagation(); let id = parseInt(btn.getAttribute("data-id")); changeQty(id, 1); });
        document.querySelectorAll(".minus").forEach(btn => btn.onclick = (e) => { e.stopPropagation(); let id = parseInt(btn.getAttribute("data-id")); changeQty(id, -1); });
        document.querySelectorAll(".add-btn").forEach(btn => btn.onclick = (e) => { e.stopPropagation(); let id = parseInt(btn.getAttribute("data-id")); addServiceById(id); });
    }

    function changeQty(serviceId, delta) { if (!tempQtys[serviceId]) tempQtys[serviceId] = 0; tempQtys[serviceId] += delta; if (tempQtys[serviceId] < 0) tempQtys[serviceId] = 0; let span = document.getElementById(`qty_${serviceId}`); if (span) span.innerText = tempQtys[serviceId]; }
    function addServiceById(serviceId) {
        let service = services.find(s => s.id === serviceId);
        let qty = tempQtys[serviceId] || 0;
        if (qty <= 0) { alert("Выберите количество (+/–)"); return; }
        let existing = cart.find(i => i.id === serviceId);
        if (existing) existing.qty += qty;
        else cart.push({ id: serviceId, name: service.name, price: service.price, qty: qty });
        tempQtys[serviceId] = 0; let span = document.getElementById(`qty_${serviceId}`); if (span) span.innerText = "0";
        renderCart();
    }

    function renderCart() {
        let container = document.getElementById("cartList");
        let subtotal = 0;
        let html = "";
        cart.forEach((item, idx) => {
            let sum = item.price * item.qty;
            subtotal += sum;
            html += `<div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${escapeHtml(item.name)}</div>
                            <div class="cart-item-detail">${item.qty} шт × ${item.price} ₽</div>
                        </div>
                        <div class="cart-item-price">${sum} ₽</div>
                        <button class="remove-btn" data-idx="${idx}">Удалить</button>
                    </div>`;
        });
        container.innerHTML = html || "<div style='padding:30px; text-align:center; color:#8C8C8C;'>Корзина пуста</div>";
        document.querySelectorAll(".remove-btn").forEach(btn => btn.onclick = () => { let idx = parseInt(btn.getAttribute("data-idx")); cart.splice(idx, 1); renderCart(); });
        let discount = 0;
        if (discountPct > 0) discount = subtotal * discountPct / 100;
        else if (discountAmt > 0) discount = Math.min(discountAmt, subtotal);
        let finalTotal = subtotal - discount;
        document.getElementById("cartSubtotal").innerHTML = subtotal + " ₽";
        if (discount > 0) { document.getElementById("discountLine").style.display = "flex"; document.getElementById("cartDiscount").innerHTML = discount + " ₽"; }
        else document.getElementById("discountLine").style.display = "none";
        document.getElementById("cartTotal").innerHTML = finalTotal + " ₽";
    }

    function applyDiscount() { discountPct = parseFloat(document.getElementById("discountPercent").value) || 0; discountAmt = parseFloat(document.getElementById("discountAmount").value) || 0; if (discountPct > 0 && discountAmt > 0) alert("Выберите один тип скидки"); renderCart(); }
    
    function completeOrder() {
        if (cart.length === 0) { alert("Корзина пуста"); return; }
        if (!shiftOpen || shiftClose) { alert("Смена не открыта! Нажмите «Открыть смену»"); return; }
        let client = document.getElementById("clientName").value.trim() || "Клиент";
        let comment = document.getElementById("orderComment").value;
        let payment = document.querySelector('input[name="payment"]:checked').value;
        let subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
        let discount = 0, discPct = 0;
        if (discountPct > 0) { discount = subtotal * discountPct / 100; discPct = discountPct; }
        else if (discountAmt > 0) discount = Math.min(discountAmt, subtotal);
        let finalTotal = subtotal - discount;
        let newOrder = { id: Date.now(), client, items: cart.map(i => ({ name: i.name, price: i.price, qty: i.qty })), subtotal, discount, discountPercent: discPct, finalTotal, paymentMethod: payment, comment, date: new Date().toLocaleString(), operator: currentUser.name };
        allOrders.push(newOrder); saveOrders();
        cart = []; discountPct = 0; discountAmt = 0;
        document.getElementById("discountPercent").value = 0; document.getElementById("discountAmount").value = 0;
        document.getElementById("clientName").value = ""; document.getElementById("orderComment").value = "";
        renderCart(); renderHistory();
        alert(`Заказ №${newOrder.id} на ${finalTotal} ₽`);
    }
    
    function getMyOrders() { return (currentUser.role === "admin") ? allOrders : allOrders.filter(o => o.operator === currentUser.name); }
    
    function renderHistory() {
        let my = getMyOrders();
        let container = document.getElementById("historyList");
        if (my.length === 0) { container.innerHTML = "<div style='padding:40px; text-align:center; color:#8C8C8C;'>Нет заказов</div>"; return; }
        let html = "";
        [...my].reverse().forEach(o => {
            let itemsShort = o.items.map(i => `${i.name} x${i.qty}`).join(", ");
            html += `<div class="history-item">
                        <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
                            <span><strong>${escapeHtml(o.client)}</strong> | ${o.date}</span>
                            <span style="font-weight: 800; color: var(--c-magenta);">${o.finalTotal} ₽</span>
                        </div>
                        <div style="font-size: 12px; margin: 8px 0; color: #8C8C8C;">${itemsShort}</div>
                        <div style="font-size: 12px;">${o.paymentMethod === "cash" ? "💵 Наличные" : "💳 Карта"} ${o.comment ? " | " + o.comment : ""}</div>
                        <button class="delete-order" data-id="${o.id}" style="margin-top: 10px; background:#c2412c; border:none; border-radius:30px; padding:6px 16px; color:white; font-size:12px;">Удалить</button>
                    </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll(".delete-order").forEach(btn => btn.onclick = () => { let id = parseInt(btn.getAttribute("data-id")); allOrders = allOrders.filter(o => o.id !== id); saveOrders(); renderHistory(); });
    }
    
    function clearMyOrders() { if (confirm("Очистить все свои заказы?")) { if (currentUser.role === "admin") allOrders = []; else allOrders = allOrders.filter(o => o.operator !== currentUser.name); saveOrders(); renderHistory(); } }
    
    function getFullOperatorsStats() {
        let stats = [];
        for (let [login, data] of Object.entries(operators)) {
            let operatorOrders = allOrders.filter(o => o.operator === data.name);
            let totalRevenue = operatorOrders.reduce((sum, o) => sum + o.finalTotal, 0);
            let totalCash = operatorOrders.filter(o => o.paymentMethod === "cash").reduce((sum, o) => sum + o.finalTotal, 0);
            let totalCard = operatorOrders.filter(o => o.paymentMethod === "card").reduce((sum, o) => sum + o.finalTotal, 0);
            let avgCheck = operatorOrders.length > 0 ? Math.round(totalRevenue / operatorOrders.length) : 0;
            stats.push({ login, name: data.name, role: data.role, ordersCount: operatorOrders.length, totalRevenue, totalCash, totalCard, avgCheck });
        }
        return stats.sort((a,b) => b.totalRevenue - a.totalRevenue);
    }
    
    function showOperatorsStats() {
        let stats = getFullOperatorsStats();
        let container = document.getElementById("operatorsStatsContent");
        let html = `<div style="margin-bottom: 20px;"><strong>Общая статистика по всем операторам</strong></div>`;
        stats.forEach(stat => {
            html += `<div class="stat-card">
                        <div class="stat-row"><span><strong>${escapeHtml(stat.name)}</strong> ${stat.role === "admin" ? "👑" : "👤"}</span><span class="stat-value">${stat.ordersCount} заказов</span></div>
                        <div class="stat-row"><span>💰 Общая выручка:</span><span class="stat-value">${stat.totalRevenue.toLocaleString()} ₽</span></div>
                        <div class="stat-row"><span>💵 Наличные:</span><span>${stat.totalCash.toLocaleString()} ₽</span></div>
                        <div class="stat-row"><span>💳 Карта:</span><span>${stat.totalCard.toLocaleString()} ₽</span></div>
                        <div class="stat-row"><span>📊 Средний чек:</span><span class="stat-value">${stat.avgCheck.toLocaleString()} ₽</span></div>
                    </div>`;
        });
        let totalRevenueAll = stats.reduce((sum, s) => sum + s.totalRevenue, 0);
        let totalOrdersAll = stats.reduce((sum, s) => sum + s.ordersCount, 0);
        html += `<div class="stat-card" style="background: #E6F4FA;"><div class="stat-row"><span><strong>📊 ИТОГО ПО ЦЕНТРУ</strong></span><span class="stat-value">${totalOrdersAll} заказов</span></div><div class="stat-row"><span>💰 Общая выручка:</span><span class="stat-value">${totalRevenueAll.toLocaleString()} ₽</span></div></div>`;
        container.innerHTML = html;
        document.getElementById("operatorsStatsModal").style.display = "flex";
    }
    
    function exportStatsToExcel() {
        let stats = getFullOperatorsStats();
        let data = [["Оператор", "Роль", "Кол-во заказов", "Выручка (₽)", "Наличные (₽)", "Карта (₽)", "Средний чек (₽)"]];
        stats.forEach(stat => data.push([stat.name, stat.role === "admin" ? "Администратор" : "Оператор", stat.ordersCount, stat.totalRevenue, stat.totalCash, stat.totalCard, stat.avgCheck]));
        let totalRevenueAll = stats.reduce((sum, s) => sum + s.totalRevenue, 0);
        let totalOrdersAll = stats.reduce((sum, s) => sum + s.ordersCount, 0);
        data.push(["ИТОГО", "", totalOrdersAll, totalRevenueAll, "", "", ""]);
        let ws = XLSX.utils.aoa_to_sheet(data);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Статистика_операторов");
        XLSX.writeFile(wb, `A4print_статистика_операторов_${new Date().toISOString().slice(0,10)}.xlsx`);
    }
    
    function generatePDFReport() {
        let my = getMyOrders();
        let totalCash = my.filter(o => o.paymentMethod === "cash").reduce((s, o) => s + o.finalTotal, 0);
        let totalCard = my.filter(o => o.paymentMethod === "card").reduce((s, o) => s + o.finalTotal, 0);
        let totalRevenue = totalCash + totalCard;
        let html = `<div class="pdf-report"><div style="text-align:center;"><h2>A4-ПРИНТ</h2><p>Кассовый отчёт</p><p>Оператор: ${currentUser.name}</p><p>Смена: ${shiftOpen || "—"} → ${shiftClose || "—"}</p></div><hr><div><strong>ИТОГИ:</strong></div><div>📦 Заказов: ${my.length}</div><div>💰 Выручка: ${totalRevenue} ₽</div><div>💵 Наличные: ${totalCash} ₽</div><div>💳 Карта: ${totalCard} ₽</div><hr><div><strong>ДЕТАЛИ ЗАКАЗОВ:</strong></div>${my.map(o => `<div style="border:1px solid #aaa; margin:12px 0; padding:10px;"><div>№${o.id} | ${o.date}</div><div>${o.client}</div><div>${o.items.map(i => `${i.name} x${i.qty}`).join(", ")}</div><div>Итого: ${o.finalTotal} ₽ | ${o.paymentMethod === "cash" ? "Нал" : "Карта"} ${o.comment ? " | " + o.comment : ""}</div></div>`).join('')}<hr><div style="text-align:center;">Подпись: _______________</div></div>`;
        let el = document.createElement('div'); el.innerHTML = html; document.body.appendChild(el);
        html2pdf().set({ margin: 0.5, filename: `A4print_${currentUser.name}_${Date.now()}.pdf`, html2canvas: { scale: 2 } }).from(el).save().then(() => el.remove());
    }
    
    function exportExcel() {
        let my = getMyOrders();
        if (!my.length) return alert("Нет данных");
        let data = [["ID","Клиент","Услуги","Сумма","Скидка","Итого","Оплата","Дата","Комментарий"]];
        my.forEach(o => data.push([o.id, o.client, o.items.map(i=>`${i.name} x${i.qty}`).join("; "), o.subtotal, o.discount, o.finalTotal, o.paymentMethod==="cash"?"Наличные":"Карта", o.date, o.comment||""]));
        let ws = XLSX.utils.aoa_to_sheet(data); let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "A4_Принт"); XLSX.writeFile(wb, `A4print_${currentUser.name}.xlsx`);
    }

    function renderAdmin() {
        let adminServices = document.getElementById("adminServicesList");
        adminServices.innerHTML = "";
        services.forEach(s => {
            adminServices.innerHTML += `<div style="display:flex; gap:12px; margin-bottom:12px; align-items:center;"><span style="flex:2;">${s.name}</span><input type="number" id="price_${s.id}" value="${s.price}" style="width:100px;"><button class="updateService" data-id="${s.id}" style="background: var(--c-cyan); color: var(--c-black);">💾</button><button class="deleteService" data-id="${s.id}" style="background: var(--c-magenta);">🗑</button></div>`;
        });
        document.querySelectorAll(".updateService").forEach(btn => btn.onclick = () => { let id = parseInt(btn.getAttribute("data-id")); let s = services.find(x => x.id === id); if (s) { s.price = parseInt(document.getElementById(`price_${id}`).value); saveServices(); renderServices(); renderAdmin(); } });
        document.querySelectorAll(".deleteService").forEach(btn => btn.onclick = () => { let id = parseInt(btn.getAttribute("data-id")); if (services.length <= 1) return alert("Нельзя удалить последнюю услугу"); services = services.filter(x => x.id !== id); saveServices(); renderServices(); renderAdmin(); });
        let opsDiv = document.getElementById("operatorsList");
        opsDiv.innerHTML = "";
        for (let [login, data] of Object.entries(operators)) { if (login === "admin") continue; opsDiv.innerHTML += `<div style="display:flex; gap:12px; margin-bottom:12px; align-items:center;"><span>${data.name} (${login})</span><input type="password" id="pass_${login}" placeholder="Новый пароль"><button class="changePass" data-login="${login}" style="background: var(--c-yellow); color: var(--c-black);">🔑</button><button class="deleteOp" data-login="${login}" style="background: var(--c-magenta);">🗑</button></div>`; }
        document.querySelectorAll(".changePass").forEach(btn => btn.onclick = () => { let log = btn.getAttribute("data-login"); let newP = document.getElementById(`pass_${log}`).value; if (newP) { operators[log].password = newP; saveOperators(); alert("Пароль изменён"); } });
        document.querySelectorAll(".deleteOp").forEach(btn => btn.onclick = () => { let log = btn.getAttribute("data-login"); if (confirm("Удалить оператора?")) { delete operators[log]; saveOperators(); renderAdmin(); } });
    }

    function initTheme() { if (localStorage.getItem("a4print_theme") === "dark") { document.body.classList.add("dark"); document.getElementById("themeToggleBtn").innerHTML = "☀️ Светлая"; } else document.getElementById("themeToggleBtn").innerHTML = "🌙 Тёмная"; }
    function toggleTheme() { if (document.body.classList.contains("dark")) { document.body.classList.remove("dark"); localStorage.setItem("a4print_theme", "light"); document.getElementById("themeToggleBtn").innerHTML = "🌙 Тёмная"; } else { document.body.classList.add("dark"); localStorage.setItem("a4print_theme", "dark"); document.getElementById("themeToggleBtn").innerHTML = "☀️ Светлая"; } }
    
    function login(login, pwd) { let u = operators[login.toLowerCase()]; if (u && u.password === pwd) { currentUser = { ...u, username: login.toLowerCase() }; localStorage.setItem("a4print_current_user", JSON.stringify(currentUser)); document.getElementById("loginOverlay").style.display = "none"; document.getElementById("mainContent").style.display = "block"; document.getElementById("currentOperatorName").innerHTML = `${u.name} ${u.role === "admin" ? "👑" : ""}`; loadData(); return true; } document.getElementById("loginError").innerText = "Неверный логин/пароль"; return false; }
    function logout() { currentUser = null; localStorage.removeItem("a4print_current_user"); location.reload(); }
    function escapeHtml(str) { return str ? String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) : ""; }

    document.addEventListener("DOMContentLoaded", () => {
        initTheme();
        let saved = localStorage.getItem("a4print_current_user");
        if (saved) { try { currentUser = JSON.parse(saved); if (operators[currentUser.username]) { document.getElementById("loginOverlay").style.display = "none"; document.getElementById("mainContent").style.display = "block"; document.getElementById("currentOperatorName").innerHTML = `${currentUser.name} ${currentUser.role === "admin" ? "👑" : ""}`; loadData(); } else logout(); } catch(e) { logout(); } }
        
        document.getElementById("themeToggleBtn").onclick = toggleTheme;
        document.getElementById("loginBtn").onclick = () => login(document.getElementById("loginUsername").value, document.getElementById("loginPassword").value);
        document.getElementById("logoutBtn").onclick = logout;
        document.getElementById("applyDiscountBtn").onclick = applyDiscount;
        document.getElementById("completeOrderBtn").onclick = completeOrder;
        document.getElementById("clearCartBtn").onclick = () => { cart = []; discountPct = 0; discountAmt = 0; renderCart(); };
        document.getElementById("exportExcelBtn").onclick = exportExcel;
        document.getElementById("clearHistoryBtn").onclick = clearMyOrders;
        document.getElementById("pdfReportBtn").onclick = generatePDFReport;
        document.getElementById("shiftToggleBtn").onclick = toggleShift;
        
        let adminModal = document.getElementById("adminModal");
        document.getElementById("adminPanelBtn").onclick = () => { renderAdmin(); adminModal.style.display = "flex"; };
        document.getElementById("closeAdminModal").onclick = () => adminModal.style.display = "none";
        
        document.getElementById("viewOperatorsStatsBtn").onclick = showOperatorsStats;
        document.getElementById("closeStatsModal").onclick = () => document.getElementById("operatorsStatsModal").style.display = "none";
        document.getElementById("exportStatsExcelBtn").onclick = exportStatsToExcel;
        
        document.getElementById("addServiceBtn").onclick = () => { let name = document.getElementById("newServiceName").value.trim(); let price = parseInt(document.getElementById("newServicePrice").value); if (name && price > 0) { services.push({ id: Date.now(), name, price }); saveServices(); renderServices(); renderAdmin(); } else alert("Введите название и цену"); };
        document.getElementById("addOperatorBtn").onclick = () => { let login = document.getElementById("newOpLogin").value.trim().toLowerCase(); let name = document.getElementById("newOpName").value.trim(); let pass = document.getElementById("newOpPass").value.trim(); if (login && name && pass) { if (operators[login]) { alert("Логин уже есть"); return; } operators[login] = { password: pass, name, role: "operator" }; saveOperators(); renderAdmin(); } else alert("Заполните все поля"); };
        
        window.onclick = (e) => { if (e.target === adminModal) adminModal.style.display = "none"; if (e.target === document.getElementById("operatorsStatsModal")) document.getElementById("operatorsStatsModal").style.display = "none"; };
    });
</script>
</body>
</html>
